<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퇴직연금 DC형 납입액 계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8f9fa; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">

        <!-- 페이지 헤더 -->
        <div class="mb-8 border-b pb-4">
            <h1 class="text-3xl font-bold text-gray-900 mb-2 tracking-tight">퇴직연금 DC형 납입액 계산기</h1>
            <p class="text-gray-500 text-sm">개인별과세소득액내역 기반 산출</p>
        </div>

        <!-- 전체 요약 패널 -->
        <div class="glass-panel rounded-2xl shadow-sm border border-green-200 p-6 mb-10 sticky top-4 z-10">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-gray-800 flex items-center">
                    <span class="w-6 h-6 rounded bg-green-100 text-green-700 flex items-center justify-center mr-2 text-xs font-bold">합</span>
                    퇴직연금 납입액 합계 요약
                </h2>
                <button onclick="exportToExcel()"
                    class="flex items-center gap-1.5 bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white text-xs font-bold px-4 py-2 rounded-lg transition shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                    </svg>
                    엑셀 추출
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b border-gray-200 text-xs font-semibold text-gray-500">
                            <th class="text-left pb-2 pr-4 w-10">No.</th>
                            <th class="text-left pb-2 pr-4">성명</th>
                            <th class="text-left pb-2 pr-4">사번</th>
                            <th class="text-right pb-2">퇴직연금 납입액</th>
                        </tr>
                    </thead>
                    <tbody id="summaryTableBody">
                        <tr>
                            <td colspan="4" class="py-3 text-center text-gray-400 text-xs">입력된 정보가 없습니다.</td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr class="border-t-2 border-gray-300">
                            <td colspan="3" class="pt-3 font-bold text-gray-700 text-sm">합계</td>
                            <td class="pt-3 text-right text-xl font-black text-green-600" id="summaryTotal">0</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <!-- 직원 폼 목록 -->
        <div id="personsContainer" class="space-y-12"></div>

        <!-- 직원 추가 버튼 -->
        <div class="mt-10 text-center">
            <button onclick="addPerson()" class="bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold px-8 py-3 rounded-xl transition shadow-md text-base">
                + 직원 추가
            </button>
            <span class="block text-xs text-gray-400 mt-2">현재 <span id="personCount">0</span>명 입력됨</span>
        </div>

    </div>

    <script>
        let persons = [];

        function createPerson() {
            return {
                empName: '',
                empId: '',
                startDate: '',
                endDate: '',
                totalBase: 0,
                firstMode: 'prorated',
                firstBase: 0,
                firstDeduction: 0,
                lastMode: 'prorated',
                lastBase: 0,
                lastDeduction: 0,
                extraPays: [],
                prevPaid: 0,
                severance: 0,
                totalWage: 0
            };
        }

        function parseNum(str) {
            return parseInt((str || '').replace(/,/g, '')) || 0;
        }

        function formatNumber(input) {
            let value = input.value.replace(/[^0-9]/g, '');
            input.value = value ? Number(value).toLocaleString() : '';
        }

        function getDaysInMonth(year, month) {
            return new Date(year, month, 0).getDate();
        }

        function syncField(idx, field, value) {
            persons[idx][field] = value;
        }

        function togglePrevPaid(idx) {
            const section = document.getElementById(`prevPaidSection-${idx}`);
            const btn = document.getElementById(`prevPaidToggle-${idx}`);
            const isHidden = section.classList.contains('hidden');
            section.classList.toggle('hidden');
            btn.textContent = isHidden ? '숨기기' : '입력';
            if (!isHidden) {
                syncField(idx, 'prevPaid', 0);
                document.getElementById(`prevPaid-${idx}`).value = '';
                calculatePerson(idx);
            }
        }

        function setEndDateLabel(idx, label) {
            const btnA = document.getElementById(`endLabelBtnA-${idx}`);
            const btnB = document.getElementById(`endLabelBtnB-${idx}`);
            if (label === '퇴직일') {
                btnA.className = 'text-xs font-semibold px-2 py-0.5 rounded bg-blue-100 text-blue-700';
                btnB.className = 'text-xs font-semibold px-2 py-0.5 rounded text-gray-400 hover:text-gray-600 hover:bg-gray-100';
            } else {
                btnA.className = 'text-xs font-semibold px-2 py-0.5 rounded text-gray-400 hover:text-gray-600 hover:bg-gray-100';
                btnB.className = 'text-xs font-semibold px-2 py-0.5 rounded bg-blue-100 text-blue-700';
            }
        }

        function setFirstMode(idx, mode) {
            persons[idx].firstMode = mode;
            const isProrated = mode !== 'deduction';
            document.getElementById(`firstBaseField-${idx}`).classList.toggle('hidden', !isProrated);
            document.getElementById(`firstDeductionField-${idx}`).classList.toggle('hidden', isProrated);
            document.getElementById(`firstModeProrated-${idx}`).className = `text-xs font-semibold px-2 py-0.5 rounded ${isProrated ? 'bg-blue-100 text-blue-700' : 'text-gray-400 hover:text-gray-600 hover:bg-gray-100'}`;
            document.getElementById(`firstModeDeduction-${idx}`).className = `text-xs font-semibold px-2 py-0.5 rounded ${!isProrated ? 'bg-blue-100 text-blue-700' : 'text-gray-400 hover:text-gray-600 hover:bg-gray-100'}`;
            document.getElementById(`firstModeHint-${idx}`).textContent = isProrated ? '월 급여 전체 → 일할 계산' : '총합계에서 차감할 금액';
            calculatePerson(idx);
        }

        function setLastMode(idx, mode) {
            persons[idx].lastMode = mode;
            const isProrated = mode !== 'deduction';
            document.getElementById(`lastBaseField-${idx}`).classList.toggle('hidden', !isProrated);
            document.getElementById(`lastDeductionField-${idx}`).classList.toggle('hidden', isProrated);
            document.getElementById(`lastModeProrated-${idx}`).className = `text-xs font-semibold px-2 py-0.5 rounded ${isProrated ? 'bg-blue-100 text-blue-700' : 'text-gray-400 hover:text-gray-600 hover:bg-gray-100'}`;
            document.getElementById(`lastModeDeduction-${idx}`).className = `text-xs font-semibold px-2 py-0.5 rounded ${!isProrated ? 'bg-blue-100 text-blue-700' : 'text-gray-400 hover:text-gray-600 hover:bg-gray-100'}`;
            document.getElementById(`lastModeHint-${idx}`).textContent = isProrated ? '월 급여 전체 → 일할 계산' : '총합계에서 차감할 금액';
            calculatePerson(idx);
        }

        function addExtraPay(idx) {
            persons[idx].extraPays.push({ label: '', amount: 0, included: false });
            renderExtraPays(idx);
            calculatePerson(idx);
        }

        function removeExtraPay(idx, ei) {
            persons[idx].extraPays.splice(ei, 1);
            renderExtraPays(idx);
            calculatePerson(idx);
        }

        function updateExtra(idx, ei, key, value) {
            persons[idx].extraPays[ei][key] = key === 'amount'
                ? (Number(value.replace(/[^0-9]/g, '')) || 0)
                : value;
            calculatePerson(idx);
        }

        function renderExtraPays(idx) {
            const container = document.getElementById(`extraPayContainer-${idx}`);
            if (!container) return;
            if (persons[idx].extraPays.length === 0) {
                container.innerHTML = `<div class="py-4 text-center text-xs text-gray-400">등록된 항목이 없습니다. [+ 항목 추가] 버튼을 클릭하세요.</div>`;
                return;
            }
            container.innerHTML = persons[idx].extraPays.map((item, ei) => `
                <div class="grid grid-cols-12 gap-2 px-4 py-3 items-center hover:bg-gray-100 transition">
                    <div class="col-span-4">
                        <input type="text" value="${item.label}" onchange="updateExtra(${idx}, ${ei}, 'label', this.value)"
                            class="w-full bg-transparent border-none text-sm text-gray-700 focus:ring-0 p-0" placeholder="항목명">
                    </div>
                    <div class="col-span-4">
                        <input type="text" value="${Number(item.amount).toLocaleString()}"
                            oninput="formatNumber(this); updateExtra(${idx}, ${ei}, 'amount', this.value)"
                            class="w-full bg-transparent border-none text-sm font-medium text-blue-600 text-right focus:ring-0 p-0" placeholder="0">
                    </div>
                    <div class="col-span-3 text-center flex items-center justify-center">
                        <input type="checkbox" ${item.included ? 'checked' : ''}
                            onchange="updateExtra(${idx}, ${ei}, 'included', this.checked)"
                            class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500 cursor-pointer">
                    </div>
                    <div class="col-span-1 text-center">
                        <button onclick="removeExtraPay(${idx}, ${ei})" class="text-red-400 hover:text-red-600">
                            <svg class="w-4 h-4 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function getPersonHTML(idx) {
            const p = persons[idx];
            const canDelete = persons.length > 1;
            return `
            <div id="person-section-${idx}" class="border-t-4 border-blue-100 pt-8">
                <div class="flex justify-between items-center mb-6">
                    <div class="flex items-center gap-3">
                        <span class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-sm">${idx + 1}</span>
                        <h2 class="text-xl font-bold text-gray-800">직원 ${idx + 1}</h2>
                        <span class="text-xs text-gray-400">납입액 산출 정보 입력</span>
                    </div>
                    ${canDelete ? `
                    <button onclick="removePerson(${idx})"
                        class="text-xs text-red-500 border border-red-300 hover:bg-red-50 px-3 py-1.5 rounded-lg transition font-semibold">
                        삭제
                    </button>` : ''}
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    <div class="lg:col-span-7 space-y-6">

                        <!-- 1. 기본 정보 -->
                        <div class="glass-panel rounded-2xl shadow-sm border border-gray-200 p-6">
                            <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                                <span class="w-6 h-6 rounded bg-blue-100 text-blue-600 flex items-center justify-center mr-2 text-xs">1</span>
                                기본 정보 및 기산일
                            </h3>
                            <div class="grid grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label class="block text-xs font-semibold text-gray-600 mb-1">성명</label>
                                    <input type="text" id="empName-${idx}" value="${p.empName}"
                                        oninput="syncField(${idx}, 'empName', this.value); calculatePerson(${idx})"
                                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="홍길동">
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-600 mb-1">사번</label>
                                    <input type="text" id="empId-${idx}" value="${p.empId}"
                                        oninput="syncField(${idx}, 'empId', this.value); calculatePerson(${idx})"
                                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs font-semibold text-gray-600 mb-1">입사일</label>
                                    <input type="date" id="startDate-${idx}" value="${p.startDate}"
                                        onchange="syncField(${idx}, 'startDate', this.value); calculatePerson(${idx})"
                                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                                </div>
                                <div>
                                    <div class="flex items-center gap-1 mb-1">
                                        <button type="button" onclick="setEndDateLabel(${idx}, '퇴직일')" id="endLabelBtnA-${idx}" class="text-xs font-semibold px-2 py-0.5 rounded bg-blue-100 text-blue-700">퇴직일</button>
                                        <span class="text-gray-300 text-xs">/</span>
                                        <button type="button" onclick="setEndDateLabel(${idx}, '기산일자')" id="endLabelBtnB-${idx}" class="text-xs font-semibold px-2 py-0.5 rounded text-gray-400 hover:text-gray-600 hover:bg-gray-100">기산일자</button>
                                    </div>
                                    <input type="date" id="endDate-${idx}" value="${p.endDate}"
                                        onchange="syncField(${idx}, 'endDate', this.value); calculatePerson(${idx})"
                                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                                </div>
                            </div>
                        </div>

                        <!-- 2. 급여지급액 -->
                        <div class="glass-panel rounded-2xl shadow-sm border border-gray-200 p-6">
                            <h3 class="text-lg font-bold text-gray-800 mb-2 flex items-center">
                                <span class="w-6 h-6 rounded bg-blue-100 text-blue-600 flex items-center justify-center mr-2 text-xs">2</span>
                                급여지급액
                            </h3>
                            <p class="text-xs text-gray-500 mb-5">명세서에 표기된 1년치 기본급여 총계와, 첫 달 / 마지막 달 지급액을 입력합니다. 각 달마다 <b>일할 계산</b>(월 급여 자동 안분) 또는 <b>차감액 입력</b>(총합계에서 직접 차감) 방식을 선택할 수 있습니다. (과세별도 수당 제외)</p>
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-bold text-gray-800 mb-1">1년치 급여지급액 총합계
                                        <span class="text-xs font-normal text-gray-400 ml-1">(원)</span>
                                    </label>
                                    <div class="relative">
                                        <input type="text" id="totalBase-${idx}" value="${p.totalBase ? Number(p.totalBase).toLocaleString() : ''}"
                                            oninput="formatNumber(this); syncField(${idx}, 'totalBase', parseNum(this.value)); calculatePerson(${idx})"
                                            class="w-full border border-gray-300 rounded-lg px-4 py-3 text-lg font-bold text-right focus:ring-2 focus:ring-blue-500 focus:outline-none pr-8" placeholder="0">
                                        <span class="absolute right-3 top-3.5 text-gray-500 text-sm">원</span>
                                    </div>
                                </div>
                                <div class="grid grid-cols-2 gap-4 pt-2">
                                    <div>
                                        <div class="flex flex-wrap items-center gap-1 mb-1.5">
                                            <span class="text-xs font-semibold text-gray-700 mr-0.5">첫 달 지급액</span>
                                            <button type="button" onclick="setFirstMode(${idx}, 'prorated')" id="firstModeProrated-${idx}"
                                                class="text-xs font-semibold px-2 py-0.5 rounded ${(p.firstMode || 'prorated') !== 'deduction' ? 'bg-blue-100 text-blue-700' : 'text-gray-400 hover:text-gray-600 hover:bg-gray-100'}">일할 계산</button>
                                            <button type="button" onclick="setFirstMode(${idx}, 'deduction')" id="firstModeDeduction-${idx}"
                                                class="text-xs font-semibold px-2 py-0.5 rounded ${(p.firstMode || 'prorated') === 'deduction' ? 'bg-blue-100 text-blue-700' : 'text-gray-400 hover:text-gray-600 hover:bg-gray-100'}">차감액 입력</button>
                                        </div>
                                        <div class="relative ${(p.firstMode || 'prorated') !== 'deduction' ? '' : 'hidden'}" id="firstBaseField-${idx}">
                                            <input type="text" id="firstBase-${idx}" value="${p.firstBase ? Number(p.firstBase).toLocaleString() : ''}"
                                                oninput="formatNumber(this); syncField(${idx}, 'firstBase', parseNum(this.value)); calculatePerson(${idx})"
                                                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-right focus:ring-2 focus:ring-blue-500 focus:outline-none pr-8" placeholder="0">
                                            <span class="absolute right-3 top-2.5 text-gray-500 text-sm">원</span>
                                        </div>
                                        <div class="relative ${(p.firstMode || 'prorated') === 'deduction' ? '' : 'hidden'}" id="firstDeductionField-${idx}">
                                            <input type="text" id="firstDeduction-${idx}" value="${p.firstDeduction ? Number(p.firstDeduction).toLocaleString() : ''}"
                                                oninput="formatNumber(this); syncField(${idx}, 'firstDeduction', parseNum(this.value)); calculatePerson(${idx})"
                                                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-right focus:ring-2 focus:ring-blue-500 focus:outline-none pr-8" placeholder="0">
                                            <span class="absolute right-3 top-2.5 text-gray-500 text-sm">원</span>
                                        </div>
                                        <p class="text-xs text-gray-400 mt-1" id="firstModeHint-${idx}">${(p.firstMode || 'prorated') !== 'deduction' ? '월 급여 전체 → 일할 계산' : '총합계에서 차감할 금액'}</p>
                                    </div>
                                    <div>
                                        <div class="flex flex-wrap items-center gap-1 mb-1.5">
                                            <span class="text-xs font-semibold text-gray-700 mr-0.5">마지막 달 지급액</span>
                                            <button type="button" onclick="setLastMode(${idx}, 'prorated')" id="lastModeProrated-${idx}"
                                                class="text-xs font-semibold px-2 py-0.5 rounded ${(p.lastMode || 'prorated') !== 'deduction' ? 'bg-blue-100 text-blue-700' : 'text-gray-400 hover:text-gray-600 hover:bg-gray-100'}">일할 계산</button>
                                            <button type="button" onclick="setLastMode(${idx}, 'deduction')" id="lastModeDeduction-${idx}"
                                                class="text-xs font-semibold px-2 py-0.5 rounded ${(p.lastMode || 'prorated') === 'deduction' ? 'bg-blue-100 text-blue-700' : 'text-gray-400 hover:text-gray-600 hover:bg-gray-100'}">차감액 입력</button>
                                        </div>
                                        <div class="relative ${(p.lastMode || 'prorated') !== 'deduction' ? '' : 'hidden'}" id="lastBaseField-${idx}">
                                            <input type="text" id="lastBase-${idx}" value="${p.lastBase ? Number(p.lastBase).toLocaleString() : ''}"
                                                oninput="formatNumber(this); syncField(${idx}, 'lastBase', parseNum(this.value)); calculatePerson(${idx})"
                                                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-right focus:ring-2 focus:ring-blue-500 focus:outline-none pr-8" placeholder="0">
                                            <span class="absolute right-3 top-2.5 text-gray-500 text-sm">원</span>
                                        </div>
                                        <div class="relative ${(p.lastMode || 'prorated') === 'deduction' ? '' : 'hidden'}" id="lastDeductionField-${idx}">
                                            <input type="text" id="lastDeduction-${idx}" value="${p.lastDeduction ? Number(p.lastDeduction).toLocaleString() : ''}"
                                                oninput="formatNumber(this); syncField(${idx}, 'lastDeduction', parseNum(this.value)); calculatePerson(${idx})"
                                                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-right focus:ring-2 focus:ring-blue-500 focus:outline-none pr-8" placeholder="0">
                                            <span class="absolute right-3 top-2.5 text-gray-500 text-sm">원</span>
                                        </div>
                                        <p class="text-xs text-gray-400 mt-1" id="lastModeHint-${idx}">${(p.lastMode || 'prorated') !== 'deduction' ? '월 급여 전체 → 일할 계산' : '총합계에서 차감할 금액'}</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 3. 과세별도기지급액 -->
                        <div class="glass-panel rounded-2xl shadow-sm border border-gray-200 p-6">
                            <div class="flex justify-between items-center mb-2">
                                <h3 class="text-lg font-bold text-gray-800 flex items-center">
                                    <span class="w-6 h-6 rounded bg-blue-100 text-blue-600 flex items-center justify-center mr-2 text-xs">3</span>
                                    과세별도기지급액 관리
                                </h3>
                                <button onclick="addExtraPay(${idx})"
                                    class="text-xs bg-gray-100 text-gray-700 font-semibold px-3 py-1.5 rounded-lg hover:bg-gray-200 transition">
                                    + 항목 추가
                                </button>
                            </div>
                            <p class="text-xs text-gray-500 mb-4">비일회성 수당(연차수당, 상여금 등)은 체크하면 급여지급액과 합산하여 임금총액에 포함됩니다. 체크하지 않은 항목(일회성 수당 등)은 제외됩니다.</p>
                            <div class="bg-gray-50 rounded-xl border border-gray-200 p-1">
                                <div class="grid grid-cols-12 gap-2 px-4 py-2 border-b border-gray-200 text-xs font-semibold text-gray-500 text-center">
                                    <div class="col-span-4 text-left">수당명 / 메모</div>
                                    <div class="col-span-4 text-right">금액 (원)</div>
                                    <div class="col-span-3">비일회성 포함</div>
                                    <div class="col-span-1">삭제</div>
                                </div>
                                <div id="extraPayContainer-${idx}" class="divide-y divide-gray-100"></div>
                            </div>
                        </div>

                        <!-- 4. 기지급 납입액 차감 -->
                        <div class="glass-panel rounded-2xl shadow-sm border border-gray-200 p-6">
                            <div class="flex justify-between items-center mb-2">
                                <h3 class="text-lg font-bold text-gray-800 flex items-center">
                                    <span class="w-6 h-6 rounded bg-blue-100 text-blue-600 flex items-center justify-center mr-2 text-xs">4</span>
                                    기 지급 납입액 차감
                                </h3>
                                <button type="button" onclick="togglePrevPaid(${idx})" id="prevPaidToggle-${idx}"
                                    class="text-xs text-gray-500 border border-gray-300 hover:bg-gray-50 px-3 py-1.5 rounded-lg transition font-semibold">입력</button>
                            </div>
                            <p class="text-xs text-gray-500">기존에 이미 지급된 퇴직연금 납입액이 있는 경우 입력합니다. 산출된 퇴직연금 납입액에서 차감됩니다.</p>
                            <div id="prevPaidSection-${idx}" class="hidden mt-4">
                                <div class="relative">
                                    <input type="text" id="prevPaid-${idx}" value="${p.prevPaid ? Number(p.prevPaid).toLocaleString() : ''}"
                                        oninput="formatNumber(this); syncField(${idx}, 'prevPaid', parseNum(this.value)); calculatePerson(${idx})"
                                        placeholder="0"
                                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-right focus:ring-2 focus:ring-blue-500 focus:outline-none pr-8">
                                    <span class="absolute right-3 top-2.5 text-gray-500 text-sm">원</span>
                                </div>
                            </div>
                        </div>

                    </div>

                    <!-- 우측: 결과 패널 -->
                    <div class="lg:col-span-5">
                        <div class="bg-gray-900 rounded-2xl shadow-xl p-6 md:p-8 text-white" style="position:sticky; top:160px;">
                            <h3 class="text-lg font-bold text-gray-100 mb-6 flex items-center border-b border-gray-700 pb-4">
                                <span class="w-6 h-6 rounded bg-blue-500 text-white flex items-center justify-center mr-2 text-xs">결과</span>
                                최종 산출 내역
                            </h3>
                            <div class="space-y-5 mb-8">
                                <div class="flex justify-between items-center text-sm">
                                    <span class="text-gray-400">성명</span>
                                    <span class="font-medium" id="resName-${idx}">-</span>
                                </div>
                                <div class="flex justify-between items-center text-sm">
                                    <span class="text-gray-400">사번</span>
                                    <span class="font-medium" id="resId-${idx}">-</span>
                                </div>
                                <div class="pt-4 border-t border-gray-800">
                                    <span class="text-gray-400 text-sm block mb-1">산출된 임금총액 (A)</span>
                                    <div class="text-3xl font-bold text-blue-400 text-right" id="resTotalWage-${idx}">0</div>
                                    <div class="text-right text-xs text-gray-600 mt-0.5">원</div>
                                </div>
                                <div class="pt-4 border-t border-gray-800">
                                    <span class="text-gray-400 text-sm block mb-1">예상 퇴직연금 납입액 (A ÷ 12)</span>
                                    <div class="text-4xl font-black text-white text-right tracking-tight" id="resSeverance-${idx}">0</div>
                                    <div class="text-right text-xs text-gray-600 mt-0.5">원</div>
                                </div>
                                <div id="resPrevPaidRow-${idx}" class="hidden pt-4 border-t border-gray-800 space-y-3">
                                    <div class="flex justify-between items-center text-sm">
                                        <span class="text-gray-400">기 지급 납입액 차감</span>
                                        <span class="text-red-400 font-semibold" id="resPrevPaid-${idx}">-0원</span>
                                    </div>
                                    <div>
                                        <span class="text-gray-400 text-sm block mb-1">최종 퇴직연금 납입액 (차감 후)</span>
                                        <div class="text-4xl font-black text-green-400 text-right tracking-tight" id="resNetSeverance-${idx}">0</div>
                                        <div class="text-right text-xs text-gray-600 mt-0.5">원</div>
                                    </div>
                                </div>
                            </div>
                            <div class="bg-gray-800 p-5 rounded-xl border border-gray-700">
                                <h4 class="text-sm font-bold text-gray-300 mb-2">산출 방법</h4>
                                <div class="text-xs text-gray-400 leading-relaxed" id="resDescription-${idx}"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            `;
        }

        function renderAllPersons() {
            const container = document.getElementById('personsContainer');
            container.innerHTML = persons.map((_, i) => getPersonHTML(i)).join('');
            persons.forEach((_, i) => renderExtraPays(i));
            document.getElementById('personCount').textContent = persons.length;
        }

        function addPerson() {
            persons.push(createPerson());
            renderAllPersons();
            calculateAll();
            const newSection = document.getElementById(`person-section-${persons.length - 1}`);
            if (newSection) newSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function removePerson(idx) {
            if (persons.length <= 1) return;
            persons.splice(idx, 1);
            renderAllPersons();
            calculateAll();
        }

        function calculatePerson(idx) {
            const p = persons[idx];
            const el = (id) => document.getElementById(id);

            el(`resName-${idx}`).innerText = p.empName || '-';
            el(`resId-${idx}`).innerText = p.empId || '-';

            const firstMode = p.firstMode || 'prorated';
            const lastMode = p.lastMode || 'prorated';

            let proratedFirst = 0, proratedLast = 0;
            let startTotal = 0, startWorked = 0, endTotal = 0, endWorked = 0;

            if (p.startDate && p.endDate) {
                const startD = new Date(p.startDate);
                startTotal = getDaysInMonth(startD.getFullYear(), startD.getMonth() + 1);
                startWorked = startTotal - startD.getDate() + 1;
                proratedFirst = (p.firstBase / startTotal) * startWorked;

                const endD = new Date(p.endDate);
                endTotal = getDaysInMonth(endD.getFullYear(), endD.getMonth() + 1);
                endWorked = endD.getDate();
                proratedLast = (p.lastBase / endTotal) * endWorked;
            }

            // 첫 달: 일할 계산이면 월 급여 전체를 빼고 안분액을 더함, 차감액이면 차감액만 뺌
            let firstSubtract = 0, firstContrib = 0;
            if (firstMode === 'prorated') {
                firstSubtract = p.firstBase || 0;
                firstContrib = proratedFirst;
            } else {
                firstSubtract = p.firstDeduction || 0;
                firstContrib = 0;
            }

            // 마지막 달: 동일 분기
            let lastSubtract = 0, lastContrib = 0;
            if (lastMode === 'prorated') {
                lastSubtract = p.lastBase || 0;
                lastContrib = proratedLast;
            } else {
                lastSubtract = p.lastDeduction || 0;
                lastContrib = 0;
            }

            let includedExtra = 0, includedCount = 0;
            p.extraPays.forEach(item => {
                if (item.included) {
                    includedCount++;
                    includedExtra += item.amount;
                }
            });

            const prevPaid = p.prevPaid || 0;

            const lines = [];
            if (p.startDate && p.endDate) {
                lines.push(`<div>· 중간 기간 급여: 전액 반영</div>`);
                if (firstMode === 'prorated' && (p.firstBase || 0) > 0) {
                    lines.push(`<div>· 첫 달: ${startTotal}일 중 <b class="text-gray-200">${startWorked}일</b> 일할 → <b class="text-gray-200">${Math.round(proratedFirst).toLocaleString()}원</b></div>`);
                } else if (firstMode === 'deduction' && firstSubtract > 0) {
                    lines.push(`<div>· 첫 달: 총합계에서 <b class="text-gray-200">${firstSubtract.toLocaleString()}원</b> 차감</div>`);
                }
                if (lastMode === 'prorated' && (p.lastBase || 0) > 0) {
                    lines.push(`<div>· 마지막 달: ${endTotal}일 중 <b class="text-gray-200">${endWorked}일</b> 일할 → <b class="text-gray-200">${Math.round(proratedLast).toLocaleString()}원</b></div>`);
                } else if (lastMode === 'deduction' && lastSubtract > 0) {
                    lines.push(`<div>· 마지막 달: 총합계에서 <b class="text-gray-200">${lastSubtract.toLocaleString()}원</b> 차감</div>`);
                }
            } else {
                lines.push(`<div>· 급여지급액 총합계 기반 산출</div>`);
            }
            lines.push(`<div>· 과세별도: 비일회성 <b class="text-gray-200">${includedCount}건</b> 급여지급액과 합산</div>`);
            lines.push(`<div>· 임금총액 ÷ 12 = 예상 퇴직연금 납입액</div>`);
            if (prevPaid > 0) {
                lines.push(`<div class="text-yellow-400">· 기 지급 납입액 차감 적용</div>`);
            }
            const explanation = lines.join('');

            const finalWage = p.totalBase - firstSubtract + firstContrib - lastSubtract + lastContrib + includedExtra;
            p.totalWage = Math.round(finalWage);
            const grossSeverance = Math.round(finalWage / 12);
            const netSeverance = grossSeverance - prevPaid;
            p.severance = netSeverance;

            el(`resTotalWage-${idx}`).innerText = p.totalWage.toLocaleString();
            el(`resSeverance-${idx}`).innerText = grossSeverance.toLocaleString();
            el(`resDescription-${idx}`).innerHTML = explanation;

            const prevPaidRow = el(`resPrevPaidRow-${idx}`);
            if (prevPaid > 0) {
                prevPaidRow.classList.remove('hidden');
                el(`resPrevPaid-${idx}`).innerText = '-' + prevPaid.toLocaleString() + '원';
                el(`resNetSeverance-${idx}`).innerText = netSeverance.toLocaleString();
            } else {
                prevPaidRow.classList.add('hidden');
            }

            renderSummary();
        }

        function calculateAll() {
            persons.forEach((_, i) => calculatePerson(i));
        }

        function renderSummary() {
            const tbody = document.getElementById('summaryTableBody');
            let total = 0;

            if (persons.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="py-3 text-center text-gray-400 text-xs">입력된 정보가 없습니다.</td></tr>`;
                document.getElementById('summaryTotal').innerText = '0';
                return;
            }

            tbody.innerHTML = persons.map((p, i) => {
                total += p.severance || 0;
                return `
                <tr class="border-b border-gray-100 hover:bg-green-50 transition">
                    <td class="py-2.5 pr-4 text-gray-400 text-xs">${i + 1}</td>
                    <td class="py-2.5 pr-4 font-semibold text-gray-800">${p.empName || '<span class="text-gray-300">미입력</span>'}</td>
                    <td class="py-2.5 pr-4 text-gray-500">${p.empId || '<span class="text-gray-300">-</span>'}</td>
                    <td class="py-2.5 text-right font-bold text-blue-600">${(p.severance || 0).toLocaleString()}</td>
                </tr>`;
            }).join('');

            document.getElementById('summaryTotal').innerText = total.toLocaleString();
        }

        function exportToExcel() {
            const wb = XLSX.utils.book_new();
            const today = new Date().toLocaleDateString('ko-KR');
            const dateStr = new Date().toISOString().slice(0, 10);

            // ── Sheet 1: 요약 ──────────────────────────────────────────────
            const s1 = [
                ['퇴직연금 DC형 납입액 산출 내역'],
                [`산출일: ${today}`],
                [],
                ['No.', '성명', '사번', '임금총액 (원)', '예상 납입액 (÷12, 원)', '기지급 차감 (원)', '최종 납입액 (원)'],
            ];
            let grandTotal = 0;
            persons.forEach((p, i) => {
                const gross = Math.round((p.totalWage || 0) / 12);
                const prev  = p.prevPaid || 0;
                const net   = p.severance || 0;
                grandTotal += net;
                s1.push([i + 1, p.empName || '', p.empId || '', p.totalWage || 0, gross, prev || 0, net]);
            });
            s1.push([], ['', '', '합 계', '', '', '', grandTotal]);

            const ws1 = XLSX.utils.aoa_to_sheet(s1);
            ws1['!cols'] = [{wch:4},{wch:10},{wch:10},{wch:18},{wch:20},{wch:16},{wch:18}];
            XLSX.utils.book_append_sheet(wb, ws1, '요약');

            // ── Sheet 2: 상세 내역 ─────────────────────────────────────────
            const s2 = [
                ['퇴직연금 DC형 납입액 산출 상세 내역'],
                [`산출일: ${today}`],
            ];

            persons.forEach((p, i) => {
                const firstMode = p.firstMode || 'prorated';
                const lastMode  = p.lastMode  || 'prorated';

                let proratedFirst = 0, proratedLast = 0;
                let startTotal = 0, startWorked = 0, endTotal = 0, endWorked = 0;
                if (p.startDate && p.endDate) {
                    const sD = new Date(p.startDate);
                    startTotal  = getDaysInMonth(sD.getFullYear(), sD.getMonth() + 1);
                    startWorked = startTotal - sD.getDate() + 1;
                    proratedFirst = (p.firstBase / startTotal) * startWorked;
                    const eD = new Date(p.endDate);
                    endTotal  = getDaysInMonth(eD.getFullYear(), eD.getMonth() + 1);
                    endWorked = eD.getDate();
                    proratedLast = (p.lastBase / endTotal) * endWorked;
                }

                const gross = Math.round((p.totalWage || 0) / 12);
                const prev  = p.prevPaid || 0;
                const net   = p.severance || 0;

                s2.push([]);
                s2.push([`▣ 직원 ${i+1}: ${p.empName || '(미입력)'}`, `사번: ${p.empId || '-'}`, '']);
                s2.push(['항목', '내용', '금액 (원)']);
                s2.push(['입사일', p.startDate || '-', '']);
                s2.push(['퇴직일/기산일자', p.endDate || '-', '']);

                // 임금총액 산출내역
                s2.push([]);
                s2.push(['【 임금총액 산출내역 】', '', '']);
                s2.push(['1년치 급여지급액 총합계', '', p.totalBase || 0]);

                if (firstMode === 'prorated') {
                    if ((p.firstBase || 0) > 0) {
                        s2.push(['첫 달 월급여 제외', `${(p.firstBase).toLocaleString()}원 전액 제거`, -(p.firstBase)]);
                        s2.push(['첫 달 일할 반영', `${startTotal}일 중 ${startWorked}일 근무`, Math.round(proratedFirst)]);
                    }
                } else {
                    if ((p.firstDeduction || 0) > 0) {
                        s2.push(['첫 달 차감 (직접 입력)', '', -(p.firstDeduction)]);
                    }
                }

                if (lastMode === 'prorated') {
                    if ((p.lastBase || 0) > 0) {
                        s2.push(['마지막 달 월급여 제외', `${(p.lastBase).toLocaleString()}원 전액 제거`, -(p.lastBase)]);
                        s2.push(['마지막 달 일할 반영', `${endTotal}일 중 ${endWorked}일 근무`, Math.round(proratedLast)]);
                    }
                } else {
                    if ((p.lastDeduction || 0) > 0) {
                        s2.push(['마지막 달 차감 (직접 입력)', '', -(p.lastDeduction)]);
                    }
                }

                // 과세별도기지급액
                if (p.extraPays.length > 0) {
                    s2.push([]);
                    s2.push(['【 과세별도기지급액 】', '', '']);
                    p.extraPays.forEach(e => {
                        if (e.included) {
                            s2.push([`${e.label || '(항목명 없음)'}`, '비일회성 포함 → 합산', e.amount]);
                        } else {
                            s2.push([`${e.label || '(항목명 없음)'}`, '일회성 → 제외', '']);
                        }
                    });
                }

                // 산출 결과
                s2.push([]);
                s2.push(['【 산출 결과 】', '', '']);
                s2.push(['임금총액 (A)', '', p.totalWage || 0]);
                s2.push(['예상 퇴직연금 납입액 (A÷12)', '', gross]);
                if (prev > 0) {
                    s2.push(['기 지급 납입액 차감', '', -prev]);
                    s2.push(['최종 퇴직연금 납입액', '', net]);
                } else {
                    s2.push(['최종 퇴직연금 납입액', '', net]);
                }
            });

            const ws2 = XLSX.utils.aoa_to_sheet(s2);
            ws2['!cols'] = [{wch:32},{wch:28},{wch:16}];
            XLSX.utils.book_append_sheet(wb, ws2, '상세 내역');

            XLSX.writeFile(wb, `퇴직연금_납입액_산출_${dateStr}.xlsx`);
        }

        // 초기화
        persons.push(createPerson());
        renderAllPersons();
        calculateAll();
    </script>
</body>
</html>
